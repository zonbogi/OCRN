<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Collectivité | OCRN </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <!-- Favicon -->

    <link
        rel="icon"
        type="image/x-icon"
        href="assets/favicon/favicon.ico"
    >

    <link
        rel="icon"
        type="image/png"
        sizes="96x96"
        href="assets/favicon/favicon-96x96.png"
    >

    <link
        rel="apple-touch-icon"
        sizes="180x180"
        href="assets/favicon/apple-touch-icon.png"
    >

    <link
        rel="manifest"
        href="assets/favicon/site.webmanifest"
    >

</head>

<body>

<div id="header"></div>

<script src="header.js"></script>


    <main class="collectivite-page">

        <section class="collectivite-hero">

            <h1 id="nom-ville">
                Chargement...
            </h1>

        </section>

        <section class="infos-grid">

            <div class="info-card">

                <span>
                    Maire
                </span>

                <h3 id="maire"></h3>

            </div>

            <div class="info-card">

                <span>
                    Région
                </span>

                <h3 id="region"></h3>

            </div>

            <div class="info-card">

                <span>
                    Population
                </span>

                <h3 id="population"></h3>

            </div>

            <div class="info-card">

    <span>
        Observations
    </span>

    <h3 id="nb-observations">
        0
    </h3>

</div>

        </section>

        <section class="observations-section">

            <h2>
                Observations
            </h2>

            <div
        id="observations-zone"
        class="observations-grid"
    ></div>

        </section>

        

    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="script.js"></script>

    <script src="collectivite.js"></script>

</body>

</html>
