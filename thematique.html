<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Collectivité</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <div id="header"></div>

    <script>

fetch("header.html")
    .then(response => response.text())
    .then(data => {

        document.getElementById("header").innerHTML = data;

        const navbar = document.querySelector(".navbar");

        navbar.classList.add("intro");

        setTimeout(() => {
            navbar.classList.remove("intro");
        }, 1000);

        const page =
            window.location.pathname
            .split("/")
            .pop();

        document
            .querySelectorAll(".menu-item")
            .forEach(item => {

                if (
                    item.getAttribute("href")
                    === page
                ) {
                    item.classList.add("actif");
                }

            });

    });

</script>

<main class="thematique-page">

        <div class="thematique-hero">

    <div class="thematique-badge">
        THÉMATIQUE
    </div>

    <p id="compteur-observations"></p>

</div>

</p>

</main>
